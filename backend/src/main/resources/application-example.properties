# =============================================================================
# application-example.properties
# NexaERP – Example / Template Configuration
# =============================================================================
# Copy this file and use it as a reference when setting up environment
# variables for local development or deployment.
#
# DO NOT commit real secrets. This file is safe to commit because it only
# contains placeholder values.
#
# HOW TO USE (choose one approach):
#   1. IDE Run Configuration – set environment variables in your run config.
#   2. .env file          – export variables before starting the app:
#                              source .env   (Linux/macOS)
#                              $env:...=... (PowerShell)
#   3. Docker / CI        – inject via -e flags or your CI secret manager.
# =============================================================================

spring.application.name=backend

# ---------------------------------------------------------------------------
# DataSource – MySQL
# ---------------------------------------------------------------------------
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/nexaerp

# Required environment variables:
#   DB_USERNAME   – MySQL user with access to the 'nexaerp' schema
#   DB_PASSWORD   – Password for the above user
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# ---------------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------------
server.port=8085

# ---------------------------------------------------------------------------
# JWT
# ---------------------------------------------------------------------------
# Required environment variable:
#   JWT_SECRET   – A random string of at least 32 characters (256-bit).
#                  Generate with: openssl rand -hex 32
#                  Example placeholder (NOT a real secret):
#                  change-me-to-a-random-256-bit-hex-string-here-00000000000
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
app.security.max-failed-attempts=5
app.security.lock-duration-minutes=30

# ---------------------------------------------------------------------------
# Gmail SMTP
# ---------------------------------------------------------------------------
# Required environment variables:
#   MAIL_USERNAME  – Gmail address used to send emails
#   MAIL_PASSWORD  – Gmail App Password (NOT your Google account password).
#                    Generate at: https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ---------------------------------------------------------------------------
# Frontend URL
# ---------------------------------------------------------------------------
app.frontend.url=http://localhost:4200

# ---------------------------------------------------------------------------
# Default Super Admin (seeded on first startup)
# ---------------------------------------------------------------------------
# Required environment variables:
#   DEFAULT_ADMIN_EMAIL    – Email for the bootstrap admin account
#   DEFAULT_ADMIN_PASSWORD – Strong password (change immediately after login)
app.default-admin.email=${DEFAULT_ADMIN_EMAIL}
app.default-admin.password=${DEFAULT_ADMIN_PASSWORD}

# =============================================================================
# Quick-start: copy the block below into a .env file (git-ignored) and fill in
# your local values.
# =============================================================================
# DB_USERNAME=root
# DB_PASSWORD=your_mysql_password_here
# JWT_SECRET=change-me-to-a-random-256-bit-hex-string-here-0000000000000000
# MAIL_USERNAME=you@gmail.com
# MAIL_PASSWORD=your_gmail_app_password_here
# DEFAULT_ADMIN_EMAIL=admin@example.com
# DEFAULT_ADMIN_PASSWORD=StrongP@ssw0rd!
