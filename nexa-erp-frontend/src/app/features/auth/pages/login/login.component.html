<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-icon">
        <i class="bi bi-building"></i>
      </div>
      <h1>NexaERP</h1>
      <p>Enterprise Resource Planning System</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="submit()" class="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <i class="bi bi-envelope"></i>
          <input
            type="email"
            formControlName="email"
            placeholder="Enter email"
          />
        </div>

        <small *ngIf="loginForm.controls.email.touched && loginForm.controls.email.invalid">
          Valid email is required
        </small>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="bi bi-lock"></i>
          <input
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            placeholder="Enter password"
          />
          <button type="button" class="password-toggle" (click)="togglePassword()">
            <i class="bi" [ngClass]="showPassword() ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>

        <small *ngIf="loginForm.controls.password.touched && loginForm.controls.password.invalid">
          Password is required
        </small>
      </div>

      <button type="submit" class="login-btn" [disabled]="loading()">
        <span *ngIf="!loading()">Login</span>
        <span *ngIf="loading()">
          <i class="bi bi-arrow-repeat spinner"></i>
          Logging in...
        </span>
      </button>
    </form>
  </div>
</div>
