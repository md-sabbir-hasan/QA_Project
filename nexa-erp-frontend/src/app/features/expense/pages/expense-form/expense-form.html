<div class="expense-page">
  <section class="expense-hero">
    <div>
      <span class="eyebrow">Finance Operations</span>
      <h1>New Expense</h1>
      <p>Record a small bill — mobile bill, utility, office supplies etc.</p>
    </div>
  </section>

  <form [formGroup]="form" (ngSubmit)="submit()" class="form-card">

    <div class="form-row">
      <div class="form-group">
        <label>Expense Date</label>
        <input type="date" formControlName="expenseDate" />
      </div>

      <div class="form-group">
        <label>Category</label>
        <select formControlName="expenseAccountId">
          <option [ngValue]="null">Select category</option>
          @for (acc of expenseAccounts(); track acc.id) {
          <option [ngValue]="acc.id">{{ acc.name }}</option>
          }
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Amount</label>
        <input type="number" step="0.01" formControlName="amount" />
      </div>

      <div class="form-group">
        <label>Reference No (optional)</label>
        <input type="text" formControlName="referenceNumber" placeholder="Operator bill ref, etc." />
      </div>
    </div>

    <div class="form-group toggle-group">
      <label>Payment</label>
      <div class="toggle-options">
        <label class="toggle-option">
          <input type="radio" formControlName="paidImmediately" [value]="true" />
          Pay Now
        </label>
        <label class="toggle-option">
          <input type="radio" formControlName="paidImmediately" [value]="false" />
          Pay Later
        </label>
      </div>
    </div>

    @if (paidImmediately) {
    <div class="form-group">
      <label>Pay From (Cash / Bank / Wallet)</label>
      <select formControlName="paymentAccountId">
        <option [ngValue]="null">Select account</option>
        @for (acc of paymentAccounts(); track acc.id) {
        <option [ngValue]="acc.id">{{ acc.name }}</option>
        }
      </select>
    </div>
    } @else {
    <div class="form-group">
      <label>Payee / Vendor</label>
      <select formControlName="partyId">
        <option [ngValue]="null">Select vendor</option>
        @for (p of parties(); track p.id) {
        <option [ngValue]="p.id">{{ p.name }}</option>
        }
      </select>
    </div>
    }

    <div class="form-group">
      <label>Notes</label>
      <textarea formControlName="notes" rows="3"></textarea>
    </div>

    <div class="form-group">
      <label>Receipt / Bill Photo (optional)</label>
      <input type="file" accept="image/*,.pdf" (change)="onFileSelected($event)" />
    </div>

    <div class="form-actions">
      <a routerLink="/expense" class="btn-cancel-link">Cancel</a>
      <button type="submit" class="btn-submit" [disabled]="submitting()">
        {{ submitting() ? 'Saving...' : 'Save Expense' }}
      </button>
    </div>

  </form>
</div>
