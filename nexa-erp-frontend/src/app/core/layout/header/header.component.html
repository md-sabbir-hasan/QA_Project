<header class="erp-header">
  <div class="header-left">
    <button class="menu-btn" type="button" (click)="toggleSidebar.emit()">
      <i class="bi bi-list"></i>
    </button>

    <div class="title-block">
      <span class="page-kicker">
        <i class="bi bi-circle-fill"></i>
        Workspace
      </span>
      <h2>{{ pageTitle() }}</h2>
    </div>
  </div>

  <div class="header-center">
    <i class="bi bi-search"></i>
    <input type="text" placeholder="Search modules, reports..." disabled />
    <kbd>⌘K</kbd>
  </div>

  <div class="header-right">
    <button class="header-icon" type="button" title="Notifications">
      <i class="bi bi-bell"></i>
      <span class="notify-dot"></span>
    </button>

    <div class="header-divider"></div>

    <div class="profile-wrap">
      <button class="profile-chip" type="button" (click)="toggleMenu()" [class.active]="menuOpen()">
        <div class="avatar">
          @if (initials()) {
            <span>{{ initials() }}</span>
          } @else {
            <i class="bi bi-person"></i>
          }
        </div>

        <div class="profile-text">
          <strong>{{ displayName() }}</strong>
          <span>{{ displayRole() }}</span>
        </div>

        <i class="bi bi-chevron-down chevron" [class.open]="menuOpen()"></i>
      </button>

      @if (menuOpen()) {
        <div class="profile-menu">
          <div class="profile-menu-header">
            <div class="avatar large">
              @if (initials()) {
                <span>{{ initials() }}</span>
              } @else {
                <i class="bi bi-person"></i>
              }
            </div>
            <div>
              <strong>{{ displayName() }}</strong>
              <span>{{ currentUser()?.email }}</span>
            </div>
          </div>

          <div class="profile-menu-role">
            <i class="bi bi-shield-check"></i>
            {{ displayRole() }}
          </div>

          <div class="profile-menu-divider"></div>

          <button type="button" class="profile-menu-item danger" (click)="logout()">
            <i class="bi bi-box-arrow-right"></i>
            Sign out
          </button>
        </div>
      }
    </div>
  </div>
</header>
